# Render Blueprint — free Web Service + free Postgres (SQLite replaced by PostgreSQL).
# https://render.com/docs/infrastructure-as-code
#
# Limitations: Free Postgres expires after 30 days unless upgraded (Render docs).
# Free Web Services spin down after idle (~15 min). Outbound SMTP ports may be blocked on Free —
# use MAIL_ENABLED only if mail works for your plan or switch to an HTTPS email API later.

databases:
  - name: wardmission-db
    databaseName: wardmission
    user: wardmission
    region: oregon
    plan: free

services:
  - type: web
    name: albertsonwardplan
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wardmission-db
          property: connectionString
      - key: COOKIE_SECURE
        value: true
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
